version: '3.8'

services:
  video-studio-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - MERCURY_API_KEY=${MERCURY_API_KEY}
      - HYPERFRAME_API_KEY=${HYPERFRAME_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_CLIENT_ID=${OPENAI_CLIENT_ID}
      - OPENAI_CLIENT_SECRET=${OPENAI_CLIENT_SECRET}
      - DROPBOX_ACCESS_TOKEN=${DROPBOX_ACCESS_TOKEN}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - pauli-network
    volumes:
      - ./src:/app/src
      - ./database:/app/database

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - pauli-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  pauli-network:
    external: true
    name: pauli-network

# Usage:
# 1. Create network: docker network create pauli-network
# 2. Copy .env.example to .env and fill in keys
# 3. Run: docker-compose up
# 4. Access: http://localhost:8000/docs
